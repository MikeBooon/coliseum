services:
  db:
    image: postgres:18
    restart: no
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coli
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "postgres", "-d", "coli", "-h", "localhost"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

  traefik:
    image: traefik:v3.6
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.dev/traefik:/etc/traefik

volumes:
  pgdata:
