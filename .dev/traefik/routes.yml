# routes.yml
http:
  routers:
    rest-router:
      rule: "Host(`rest.coli.localhost`)"
      entryPoints:
        - "web"
        - "websecure"
      service: "rest-service"
      priority: 100
    fe-router:
      rule: "Host(`fe.coli.localhost`)"
      entryPoints:
        - "web"
        - "websecure"
      service: "fe-service"
      priority: 1

  services:
    fe-service:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:6565"
    rest-service:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:6464"

tls:
  certificates:
    - certFile: /etc/traefik/cert.pem
      keyFile: /etc/traefik/key.pem
