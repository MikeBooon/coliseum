# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  dev:
    dir: "./"
    deps: [docker-up]
    cmds:
      - tygo generate
      - task web & task rest

  rest:
    dir: "./"
    cmds:
      - mkdir -p .out
      - air -c rest.air.toml

  web:
    dir: "./web/"
    cmds:
      - npm run dev

  docker-up:
    dir: "./.dev"
    cmds:
      - ./create-certs.sh
      - docker compose up -d --wait

  reset:
    dir: "./.dev"
    cmds:
      - docker compose down -v
  
  test:
    dir: "./"
    cmds:
      - go test {{.CLI_ARGS | default "./..."}}
    
  seed:
    dir: "./"
    deps: [docker-up]
    cmds:
      - go run ./cmd/seed {{.CLI_ARGS}}

  auth-up:
    dir: "./.dev/zitadel"
    cmds:
      - if [ ! -f .env ]; then cp .env.example .env; fi
      - docker compose up -d

  auth-down:
    dir: "./.dev/zitadel"
    cmds:
      - docker compose down